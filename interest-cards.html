<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interest cards — hover reveals</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     INTEREST CARDS — three self-contained hover reveals
     Vanilla HTML/CSS/JS, no build step.

     Card 1 ("peek then slide in", peeks from BOTTOM)
     Card 2 ("water fill" wave reveal)
     Card 3 ("peek then slide in", peeks from TOP — mirror of card 1)

     Re-skin knobs:
       --card-bg / --card-border  → card surface
       --liquid                   → card 2 fill colour
       data-rest / data-reveal    → photo peek + revealed transforms
       data-delay                 → per-photo stagger
     ============================================================ */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --card-bg: #121212;
    --card-border: rgba(255,255,255,0.12);
    --ink: #f0f0f0;
    --ink-dim: rgba(240,240,240,0.55);
    --liquid: #f4f1ea;            /* card 2 "water" colour */
    --radius: 16px;
    --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #1a1a1a 0%, #141414 100%);
    font-family: 'Google Sans Code', ui-monospace, monospace;
    color: var(--ink);
    padding: 48px 24px;
  }

  .cards-row {
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ---------- Shared card shell ---------- */
  .card {
    position: relative;
    width: 248px;
    height: 312px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    overflow: hidden;              /* clips peeking photos + water crests */
    cursor: default;
  }

  /* ---------- Shared text layer (label row + title) ---------- */
  .card-text {
    position: absolute;
    inset: 0;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 4;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .card-text[data-align="top"]    { justify-content: flex-start; }
  .card-text[data-align="bottom"] { justify-content: flex-end; }

  .label-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-dim);
  }
  .label-row .flag {
    width: 22px;
    height: auto;
    border-radius: 4px;
    flex-shrink: 0;
    display: block;
  }
  .card-title {
    font-size: 19px;
    font-weight: 500;
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-wrap: balance;
  }

  /* Text that should fade out when the photos take over (cards 1 & 3) */
  .card:hover .card-text.fade { opacity: 0; }
  .card-text.fade[data-align="top"]    { /* shifts up on fade */ }
  .card:hover .card-text.fade[data-align="top"]    { transform: translateY(-10px); }
  .card:hover .card-text.fade[data-align="bottom"] { transform: translateY(10px); }

  /* ============================================================
     CARDS 1 & 3 — peek-then-slide photo reveal
     ============================================================ */
  .peek-photo {
    position: absolute;
    left: 50%;
    width: 152px;
    height: 188px;
    object-fit: cover;
    border-radius: 12px;
    border: 4px solid #fafafa;
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
    z-index: 2;
    transform: var(--rest);
    transition: transform 0.42s var(--ease-out);
    transition-delay: var(--delay, 0ms);
    will-change: transform;
  }
  .peek-photo[data-anchor="bottom"] { bottom: 0; }
  .peek-photo[data-anchor="top"]    { top: 0; }

  /* On hover the photos move from their peek transform to the revealed one */
  .card:hover .peek-photo { transform: var(--reveal); }

  /* ============================================================
     CARD 2 — water-fill wave reveal
     Two pseudo-element crests bob out of phase to fake a rippling
     liquid surface (adapted from the "battery loading" blob trick).
     ============================================================ */
  .liquid {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0;                                  /* drained at rest */
    background: var(--liquid);
    z-index: 2;
    transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.water:hover .liquid { height: 64%; }     /* rises to just below the label */

  /* Surface crests — two overlapping ellipses straddling the liquid's top edge */
  .liquid::before,
  .liquid::after {
    content: '';
    position: absolute;
    top: 0;
    width: 62%;
    height: 26px;
    background: inherit;
    border-radius: 50%;
    transform: translateY(-45%);
    opacity: 0;                                 /* hidden at rest so no sliver shows */
    transition: opacity 0.25s ease;
  }
  .liquid::before { left: -6%; }
  .liquid::after  { right: -6%; }
  .card.water:hover .liquid::before,
  .card.water:hover .liquid::after { opacity: 1; }

  /* Ripple only runs while hovered; the two crests bob out of phase */
  .card.water:hover .liquid::before { animation: rippleA 1.8s ease-in-out infinite; }
  .card.water:hover .liquid::after  { animation: rippleB 1.8s ease-in-out infinite; }

  @keyframes rippleA {
    0%, 100% { transform: translateY(-45%); }
    50%      { transform: translateY(-72%); }
  }
  @keyframes rippleB {
    0%, 100% { transform: translateY(-72%); }
    50%      { transform: translateY(-45%); }
  }

  /* Card 2's label sits above the water; its title gets covered as it rises */
  .card.water .card-text { z-index: 3; }
  .card.water .card-title { color: rgba(240,240,240,0.7); transition: color 0.3s ease; }

  @media (prefers-reduced-motion: reduce) {
    .peek-photo, .liquid, .card-text { transition: none; }
    .card.water:hover .liquid::before,
    .card.water:hover .liquid::after { animation: none; }
  }
</style>
</head>
<body>

  <div class="cards-row">

    <!-- ============ CARD 1 — Ukraine, peeks from BOTTOM ============ -->
    <article class="card">
      <!-- Two photos tucked below the bottom edge; only a sliver peeks in -->
      <img class="peek-photo" data-anchor="bottom" alt=""
           src="uploads/dorien-monnens-53-v5b5qfqc-unsplash.jpg"
           data-rest="translate(-50%, 78%) rotate(-7deg)"
           data-reveal="translate(-64%, 14%) rotate(-7deg)"
           data-delay="0ms" />
      <img class="peek-photo" data-anchor="bottom" alt=""
           src="uploads/annie-spratt-jtI_dsxoj1s-unsplash.jpg"
           data-rest="translate(-50%, 84%) rotate(7deg)"
           data-reveal="translate(-36%, 22%) rotate(7deg)"
           data-delay="70ms" />

      <div class="card-text fade" data-align="top">
        <span class="label-row">
          <!-- 🇺🇦 Ukraine flag -->
          <svg class="flag" viewBox="0 0 50 33" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#uk1)">
              <path d="M0 16.3794H49.9999V31.8967C49.9999 32.3727 49.6139 32.7588 49.1378 32.7588H0.862108C0.386034 32.7588 0 32.3727 0 31.8967V16.3794Z" fill="#FFDD00"/>
              <path d="M49.9999 16.3794H0V0.862107C0 0.386034 0.386034 0 0.862108 0H49.1379C49.614 0 50 0.386034 50 0.862107L49.9999 16.3794Z" fill="#0037FF"/>
            </g>
            <defs><clipPath id="uk1"><rect width="50" height="32.7588" rx="8" fill="white"/></clipPath></defs>
          </svg>
          Ukraine
        </span>
        <h3 class="card-title">Hiking in Carpathians</h3>
      </div>
    </article>

    <!-- ============ CARD 2 — Denmark, water fill ============ -->
    <article class="card water">
      <div class="liquid"></div>

      <div class="card-text" data-align="top">
        <span class="label-row">
          <!-- 🇩🇰 Denmark flag -->
          <svg class="flag" viewBox="0 0 50 33" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#dk1)">
              <path d="M49.1378 32.7586H0.862108C0.386034 32.7586 0 32.3726 0 31.8965V0.862107C0 0.386034 0.386034 0 0.862108 0H49.1379C49.614 0 50 0.386034 50 0.862107V31.8965C49.9999 32.3727 49.6139 32.7586 49.1378 32.7586Z" fill="#FF000E"/>
              <path d="M49.9999 13.793H20.6896V0H15.5173V13.793H0V18.9655H15.5173V32.7585H20.6896V18.9655H49.9999V13.793Z" fill="white"/>
            </g>
            <defs><clipPath id="dk1"><rect width="50" height="32.7586" rx="8" fill="white"/></clipPath></defs>
          </svg>
          Denmark
        </span>
        <h3 class="card-title">Training for my first 2&nbsp;km swim</h3>
      </div>
    </article>

    <!-- ============ CARD 3 — Wherever I am, peeks from TOP (mirror of card 1) ============ -->
    <article class="card">
      <img class="peek-photo" data-anchor="top" alt=""
           src="uploads/elise-bouvet-StQJj4NAYg0-unsplash.jpg"
           data-rest="translate(-50%, -78%) rotate(-7deg)"
           data-reveal="translate(-64%, -14%) rotate(-7deg)"
           data-delay="0ms" />
      <img class="peek-photo" data-anchor="top" alt=""
           src="uploads/febe-vanermen-195p-UrLHh4-unsplash.jpg"
           data-rest="translate(-50%, -84%) rotate(7deg)"
           data-reveal="translate(-36%, -22%) rotate(7deg)"
           data-delay="70ms" />

      <div class="card-text fade" data-align="bottom">
        <span class="label-row">
          <!-- placeholder flag — swap for your own "wherever" icon -->
          <svg class="flag" viewBox="0 0 50 33" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#uk3)">
              <path d="M0 16.3794H49.9999V31.8967C49.9999 32.3727 49.6139 32.7588 49.1378 32.7588H0.862108C0.386034 32.7588 0 32.3727 0 31.8967V16.3794Z" fill="#FFDD00"/>
              <path d="M49.9999 16.3794H0V0.862107C0 0.386034 0.386034 0 0.862108 0H49.1379C49.614 0 50 0.386034 50 0.862107L49.9999 16.3794Z" fill="#0037FF"/>
            </g>
            <defs><clipPath id="uk3"><rect width="50" height="32.7588" rx="8" fill="white"/></clipPath></defs>
          </svg>
          Wherever I am
        </span>
        <h3 class="card-title">Knitting comes along</h3>
      </div>
    </article>

  </div>

<script>
  /* Wire each photo's peek (rest) + revealed transforms and stagger from
     its data-* attributes into CSS custom properties. This keeps card 1
     and the mirrored card 3 fully config-driven — tweak the data-rest /
     data-reveal / data-delay strings to retune without touching the CSS. */
  document.querySelectorAll('.peek-photo').forEach(function (photo) {
    if (photo.dataset.rest)   photo.style.setProperty('--rest', photo.dataset.rest);
    if (photo.dataset.reveal) photo.style.setProperty('--reveal', photo.dataset.reveal);
    if (photo.dataset.delay)  photo.style.transitionDelay = photo.dataset.delay;
  });
</script>

</body>
</html>
